name: Auto Update Slot Data & Dashboard

on:
  schedule:
    # 毎日 UTC 18:30 (日本時間 AM 3:30) に自動実行
    - cron: '30 18 * * *'
  workflow_dispatch: # 手動実行用ボタンも有効にしておく

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Scraper (Fetch Last 8 Days of Goraggio Data)
      run: |
        # 通常営業日の直近8日分のデータを回収
        python -c "import scraper; scraper.run_goraggio_scraper(limit=8)"

    - name: Regenerate Dashboard
      run: |
        # 解析とダッシュボードHTMLの再生成
        python dashboard_generator.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add index.html slot_data.db progress.json
        # 差分がある場合のみコミット
        git diff --quiet && git diff --staged --quiet || (git commit -m "auto: Daily data update $(date +'%Y-%m-%d %H:%M:%S')" && git push origin master)
