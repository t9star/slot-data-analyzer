name: Auto Update Slot Data & Dashboard

on:
  schedule:
    # 毎日 UTC 18:30 (日本時間 AM 3:30) に自動実行
    - cron: '30 18 * * *'
  workflow_dispatch: # 手動実行用ボタンも有効にしておく
  repository_dispatch:
    types: [manual_trigger]

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Handle Custom Register Recommendation Dispatch
      if: github.event.client_payload.action == 'register_recommendation'
      run: |
        python -c "
        import sqlite3
        conn = sqlite3.connect('slot_data.db')
        cursor = conn.cursor()
        cursor.execute(
            'INSERT INTO recommended_machines (machine_name, start_date, end_date, label) VALUES (?, ?, ?, ?)',
            (
                \"${{ github.event.client_payload.machine }}\",
                \"${{ github.event.client_payload.start }}\",
                \"${{ github.event.client_payload.end }}\",
                \"${{ github.event.client_payload.label }}\"
            )
        )
        conn.commit()
        conn.close()
        "

    - name: Run Scraper (Fetch Last 8 Days of Goraggio Data)
      run: |
        # 通常営業日の直近8日分のデータを回収
        python -c "import scraper; scraper.run_goraggio_scraper(limit=8)"

    - name: Regenerate Dashboard
      run: |
        # 解析とダッシュボードHTML of 再生成
        python dashboard_generator.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add index.html slot_data.db
        git add -f progress.json || true # progress.json があれば強制add
        # 差分がある場合のみコミット＆リベースプッシュ
        if ! git diff --quiet || ! git diff --staged --quiet; then
          git commit -m "auto: Daily data update $(date +'%Y-%m-%d %H:%M:%S')"
          git pull --rebase origin master
          git push origin master
        fi
